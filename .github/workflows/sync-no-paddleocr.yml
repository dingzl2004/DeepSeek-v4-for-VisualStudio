name: Sync no-local-paddleocr

on:
  push:
    branches: [ master ]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Sync no-local-paddleocr branch
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git checkout no-local-paddleocr
        git reset --hard origin/master

        # Apply PaddleOCR removal patch (no-op if master already has PaddleOCR removed)
        if git apply --check .github/workflows/paddleocr-remove.patch 2>/dev/null; then
          git apply .github/workflows/paddleocr-remove.patch
          git add -A
          git commit -m "chore: sync with master + remove PaddleOCR only [skip ci]" || true
        fi

        git push --force-with-lease origin no-local-paddleocr
